@media(max-width:480px){.diag-grid{grid-template-columns:1fr 1fr}}
.diag-item{background:var(--ink3);border:1px solid var(--line);border-radius:7px;padding:11px;transition:border-color .3s}
.diag-item .d-label{font-size:.68rem;font-weight:600;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.diag-item .d-val{font-family:var(--mono);font-size:1rem;font-weight:600;color:var(--text)}
.diag-item .d-val.ok{color:var(--green)}.diag-item .d-val.warn{color:var(--gold)}.diag-item .d-val.danger{color:var(--red)}
.prog-wrap{margin-top:12px}
.prog-label{display:flex;justify-content:space-between;font-size:.7rem;font-weight:500;color:var(--text2);margin-bottom:4px}
.prog-bg{height:7px;border-radius:4px;background:var(--ink3);overflow:hidden;margin-bottom:9px}
.prog-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.prog-teal{background:linear-gradient(90deg,var(--teal3),var(--teal))}
.prog-gold{background:linear-gradient(90deg,var(--gold2),var(--gold))}
.prog-red{background:linear-gradient(90deg,var(--red2),var(--red))}
.warn-bar{display:none;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:7px;margin-top:2px;font-size:.7rem;line-height:1.6}
.warn-bar.show{display:flex}
.warn-red{background:rgba(204,26,42,.06);border:1px solid rgba(204,26,42,.25);color:#9b1a26}
.warn-amber{background:rgba(176,120,0,.06);border:1px solid rgba(176,120,0,.25);color:#7a5200}
.param-table{width:100%;border-collapse:collapse;font-size:.86rem}
.param-table td{padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:middle}
.param-table td:first-child{color:var(--text2);font-weight:500}
.param-table td:last-child{font-family:var(--mono);font-size:.88rem;text-align:right;color:var(--text);font-weight:600}
.param-table tr:last-child td{border:none}
.formula-toggle{font-size:.74rem;color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-top:11px}
.formula-toggle:hover{color:var(--text2)}
